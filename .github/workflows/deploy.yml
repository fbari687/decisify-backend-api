name: Build and Deploy Go API

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Go
        uses: actions/setup-go@v5.0.2
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod tidy

      - name: Build Go binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o decisify-api

      - name: Upload binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "decisify-api"
          target: "/home/apps/decisify-api"

      - name: Restart API service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl restart decisify-api
            sudo systemctl status decisify-api --no-pager